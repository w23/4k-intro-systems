# Making your own 4k intro
from scratch

No frameworks, no registration, no cloud subscriptions <!-- .element: class="fragment" -->
-v-

## Who am I?
- provod of jetlag
- made dozens of 4k intros
- built multiple different frameworks and tools
---

## Theory
- Single 32 bit exe file for Microsoft:tm: Windows:r:
- No assets, no dependencies
- Only uses what default Windows installation has
-v-

## Code
- OpenGL 2.0 window
- Fullscreen GLSL fragment shader
- Background `sointu` audio thread
- `waveOut` for audio FIXME
- Exit on ESC or after N seconds
- Use only what's strictly necessary
- Cut corners agressively
- No error checking!
-v-

## Build
- Visual Studio Build Tools
- [Shader minifier](https://github.com/laurentlb/shader-minifier) for GLSL minification
- `cl.exe /Os intro.c`
- `nasm sointu.asm` FIXME
- [Crinkler](https://github.com/runestubbe/Crinkler) for linking and compression
-v-

## Typical space budget
- 2k visuals
	- 500-800 bytes: systems
		- 400: header, decompressor, linking
		- 200: window, OpenGL context, shader program
		- 100: audio thread, output, sync
	- 1-1.5k: compressed minified shader
- 2k music
	- 1k: synth engine
	- 100 bytes per instrument
	- 200-500 bytes sequencer
---
## Basic build system
How big is the empty exe?

`intro.c` <!-- .element: class="fragment" data-fragment-index="1" -->
```c
#include <windows.h>

int WINAPI WinMain(HINSTANCE hInstance,
	HINSTANCE hPrevInstance,
	LPSTR pCmdLine,
	int nShowCmd) {
	return 0;
}
```
<!-- .element: class="fragment" data-fragment-index="1" -->

`build.bat` <!-- .element: class="fragment" data-fragment-index="2" -->
```bat
cl /Feintro.exe intro.c /link /subsystem:windows
```
<!-- .element: class="fragment" data-fragment-index="2" -->

### 85 kilobytes! <!-- .element: class="fragment" -->
-v-

## Compressed and optimized
No C library, and using Crinkler

`intro.c`
```c
#include <windows.h>

int WinMainCRTStartup(void) {
	ExitProcess(0); // Needed to terminate the process
}
```

`build.bat`
```bat
call cl %CFLAGS% intro.c
call .\crinkler.exe /subsystem:windows /OUT:intro.exe /CRINKLER

```
