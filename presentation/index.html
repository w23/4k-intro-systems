# Making your own 4k intro
from scratch <!-- .element: class="fragment" -->

No frameworks, no registration, no cloud subscriptions, no AI <!-- .element: class="fragment" -->

<small>[2026-06-19, @party, Boston, US]</small>
-v-

## Agenda
This is a serious engineering talk
- We will not talk about art <!-- .element: class="fragment" -->
	- Plenty of other materials about shaders, SDF raymarching and other tricks
	- Some materials about making music
- We'll talk systems <!-- .element: class="fragment" -->
	- How to initialize and run things
	- How to build and compress executable file
---

## Theory
- Single 32 bit exe file for Microsoft™ Windows®
- No assets, no third party dependencies
- Only uses what default Windows installation has
	- plus any GPU drivers
	- minus any included (clip) art or samples
		- With the exception of builtin `gm.dls` MIDI "sample pack" for consensus reasons
		<!-- .element: class="fragment" -->
-v-

## Code overview
- OpenGL 2.0 window
- Fullscreen GLSL fragment shader
- Background `sointu`/`4klang` audio thread
- `waveOut` for audio
- Exit on ESC or after N seconds
- Use only what's strictly necessary
- Cut corners agressively
- Feeling lucky: no error checking whatsoever! <!-- .element: class="fragment" -->
-v-

## Build overview
- Visual Studio Build Tools
- `build.bat` file with
	- [Shader minifier](https://github.com/laurentlb/shader-minifier) for GLSL minification
	- `cl.exe /Os intro.c`
	- `nasm sointu.asm` TBD
	- [Crinkler](https://github.com/runestubbe/Crinkler) for linking and compression
-v-

## Typical space budget
- 2k visuals
	- 500-800 bytes: systems
		- 400: header, decompressor, linking
		- 200: window, OpenGL context, shader program
		- 100: audio thread, output, sync
	- 1-1.5k: compressed minified shader
- 2k music
	- 1k: synth engine
	- 100 bytes per instrument
	- 200-500 bytes sequencer

## Compressed and optimized
No C library, and using Crinkler

`empty-nocrt.c` <!-- .element: class="fragment" data-fragment-index="1" -->
```c++
#include <windows.h>

int WinMainCRTStartup(void) {
	ExitProcess(0); // Needed to terminate the process
}
```
<!-- .element: class="fragment" data-fragment-index="1" -->

`build-compress.bat` <!-- .element: class="fragment" data-fragment-index="2" -->
```bat
cl empty-nocrt.c

..\crinkler.exe ^
	empty-nocrt.obj kernel32.lib user32.lib ^
	/subsystem:windows /OUT:compressed.exe /CRINKLER
```
<!-- .element: class="fragment" data-fragment-index="2" -->

### Just 433 bytes! <!-- .element: class="fragment" -->

## Making a window
```c++
#define WIDTH 1920
#define HEIGHT 1080

## Initializing OpenGL
```c++
static const PIXELFORMATDESCRIPTOR kPfd = {
	.nSize = sizeof(kPfd),
	.dwFlags =
		PFD_DOUBLEBUFFER | PFD_DRAW_TO_WINDOW | PFD_SUPPORT_OPENGL,
	.iPixelType = PFD_TYPE_RGBA,
	.cColorBits = 24,
};
```

```c++
const HDC hdc = GetDC(hwnd);
SetPixelFormat(hdc, ChoosePixelFormat(hdc, &kPfd), &kPfd);
wglMakeCurrent(hdc, wglCreateContext(hdc));
```

## Event and paint loop
```c++ [1-13]
// Clear to solid red color to check that it works
glClearColor(255, 0, 0, 0);

for (;;) {
	if (GetAsyncKeyState(VK_ESCAPE))
		break;

	glClear(GL_COLOR_BUFFER_BIT);
	SwapBuffers(hdc);

	// Pump messages to tell Windows we're alive
	PeekMessageA(NULL, 0, 0, 0, PM_REMOVE);
}
ExitProcess(0);
```
-v-

## Fullscreen shader
Define GLSL sources:
```c++
static const char *shader_source =
"void main() { gl_FragColor = vec4(0., 1., 0., 0.); }";
```

Create and use program object:
```c++
const GLint program = glCreateShaderProgramv(
	GL_FRAGMENT_SHADER, 1, &shader_source);
glUseProgram(program);
```

Draw fullscreen quad:
```c++ [1]
glRects(-1, -1, 1, 1);
SwapBuffers(hdc);
```

## ❌
<!-- .element: class="fragment" -->
```
error LNK: Cannot find symbol '_glUseProgram'
```
<!-- .element: class="fragment" -->

- Windows only provides OpenGL 1.1 lib and headers <!-- .element: class="fragment" -->
- Shaders are defined in OpenGL 2.0 (2004) <!-- .element: class="fragment" -->
- Anything newer needs to be defined <!-- .element: class="fragment" -->
- Missing functions need to be loaded manually <!-- .element: class="fragment" -->
- `wglGetProcAddress("glUseProgram");`
<!-- .element: class="fragment" -->
-v-

## Define and load
```c++
// These are defined in Khronos' glext.h
#define GL_FRAGMENT_SHADER                0x8B30

typedef char GLchar;
#define APIENTRYP APIENTRY*
typedef GLuint (APIENTRYP PFNGLCREATESHADERPROGRAMVPROC) (GLenum type, GLsizei count, const GLchar *const*strings);
typedef void (APIENTRYP PFNGLUSEPROGRAMPROC) (GLuint program);

static PFNGLCREATESHADERPROGRAMVPROC glCreateShaderProgramv;
static PFNGLUSEPROGRAMPROC glUseProgram;
```

```c++ [3-4]
wglMakeCurrent(hdc, hglrc);

glCreateShaderProgramv = (void*)wglGetProcAddress("glCreateShaderProgramv");
glUseProgram = (void*)wglGetProcAddress("glUseProgram");

const GLint program = glCreateShaderProgramv(GL_FRAGMENT_SHADER, 1, &shader_source);
```

## Pass time
Use uniforms
<!-- .element: class="fragment" data-fragment-index="1" -->
```c++
static const char *shader_source =
"uniform float t;\n"
"void main() { gl_FragColor = vec4(0., 1., .5+.5*sin(t), 0.); }";
```
<!-- .element: class="fragment" data-fragment-index="1" -->

Locate
<!-- .element: class="fragment" data-fragment-index="2" -->
```c++ [3]
glUseProgram(program);

const GLint t_loc = glGetUniformLocation(program, "t");
```
<!-- .element: class="fragment" data-fragment-index="2" -->

Set to current time in float seconds
<!-- .element: class="fragment" data-fragment-index="3" -->
```c++ [1]
glUniform1f(t_loc, GetTickCount() / 1000.f);
glRects(-1, -1, 1, 1);
```
<!-- .element: class="fragment" data-fragment-index="3" -->
-v-

## Remember to define and load
```c++ [2-3, 7-8]
typedef void (APIENTRYP PFNGLUSEPROGRAMPROC) (GLuint program);
typedef GLint (APIENTRYP PFNGLGETUNIFORMLOCATIONPROC) (GLuint program, const GLchar *name);
typedef void (APIENTRYP PFNGLUNIFORM1FPROC) (GLint location, GLfloat v0);

static PFNGLCREATESHADERPROGRAMVPROC glCreateShaderProgramv;
static PFNGLUSEPROGRAMPROC glUseProgram;
static PFNGLGETUNIFORMLOCATIONPROC glGetUniformLocation;
static PFNGLUNIFORM1FPROC glUniform1f;
```

```c++ [3-4]
glCreateShaderProgramv = (void*)wglGetProcAddress("glCreateShaderProgramv");
glUseProgram = (void*)wglGetProcAddress("glUseProgram");
glGetUniformLocation = (void*)wglGetProcAddress("glGetUniformLocation");
glUniform1f = (void*)wglGetProcAddress("glUniform1f");
```
